<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS URL Map — scottmarsh.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0C0D10;
      --surface: #13141A;
      --surface2: #1C1E27;
      --surface3: #252833;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);

      --l1-bg: #1A1030;
      --l1-border: #6C3FC5;
      --l1-text: #B899F8;
      --l1-pill: #7C4DFF;
      --l2-bg: #0D1F18;
      --l2-border: #1A7A52;
      --l2-text: #3DD68C;
      --l2-pill: #00C16A;
      --l3-bg: #1F1500;
      --l3-border: #8A5A00;
      --l3-text: #F5B942;
      --l3-pill: #F59E0B;
      --l4-bg: #1A0D10;
      --l4-border: #8A2535;
      --l4-text: #F87191;
      --l4-pill: #F43F5E;

      --sec-ufw: #3B82F6;
      --sec-cr: #10B981;
      --sec-ci: #8B5CF6;
      --sec-tb: #F59E0B;
      --sec-cb: #EC4899;
      --sec-ir: #06B6D4;
      --sec-rr: #EF4444;
      --sec-bk: #6B7280;

      --text: #E8EAF0;
      --muted: #6B7280;
      --muted2: #9CA3AF;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 13, 16, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border2);
      padding: 0 32px;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 20px;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C3FC5, #F43F5E);
      box-shadow: 0 0 12px rgba(108, 63, 197, 0.8);
    }

    .header-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hstat {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .hstat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* ── MAIN LAYOUT ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 32px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── CONTROLS ── */
    .controls {
      margin-bottom: 28px;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: rgba(108, 63, 197, 0.6);
      box-shadow: 0 0 0 3px rgba(108, 63, 197, 0.12);
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      align-self: center;
      margin-right: 4px;
      white-space: nowrap;
    }

    .pill-btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .pill-btn:hover {
      border-color: var(--border2);
      color: var(--text);
      background: var(--surface3);
    }

    .pill-btn.active {
      background: rgba(108, 63, 197, 0.2);
      border-color: rgba(108, 63, 197, 0.5);
      color: #B899F8;
    }

    .level-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .lvl-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.18s;
      border: 1px solid transparent;
      opacity: 0.5;
    }

    .lvl-btn:hover {
      opacity: 0.8;
    }

    .lvl-btn.active {
      opacity: 1;
    }

    .lvl-btn.l1 {
      background: var(--l1-bg);
      border-color: var(--l1-border);
      color: var(--l1-text);
    }

    .lvl-btn.l2 {
      background: var(--l2-bg);
      border-color: var(--l2-border);
      color: var(--l2-text);
    }

    .lvl-btn.l3 {
      background: var(--l3-bg);
      border-color: var(--l3-border);
      color: var(--l3-text);
    }

    .lvl-btn.l4 {
      background: var(--l4-bg);
      border-color: var(--l4-border);
      color: var(--l4-text);
    }

    /* ── RESULT COUNT ── */
    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .result-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .result-count strong {
      color: var(--text);
    }

    /* ── TABLE CONTAINER ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface2);
      position: sticky;
      top: 64px;
      z-index: 10;
    }

    th {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border2);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    th:hover {
      color: var(--text);
    }

    th .sort-arrow {
      margin-left: 4px;
      opacity: 0.4;
    }

    th.sorted .sort-arrow {
      opacity: 1;
      color: #B899F8;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      animation: rowIn 0.3s ease both;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    tbody tr.hidden {
      display: none;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    td {
      padding: 11px 20px;
      vertical-align: middle;
    }

    /* Level pill */
    .lvl-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .lvl-pill.l1 {
      background: var(--l1-bg);
      border-color: var(--l1-border);
      color: var(--l1-text);
    }

    .lvl-pill.l2 {
      background: var(--l2-bg);
      border-color: var(--l2-border);
      color: var(--l2-text);
    }

    .lvl-pill.l3 {
      background: var(--l3-bg);
      border-color: var(--l3-border);
      color: var(--l3-text);
    }

    .lvl-pill.l4 {
      background: var(--l4-bg);
      border-color: var(--l4-border);
      color: var(--l4-text);
    }

    .lvl-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .l1 .lvl-dot {
      background: var(--l1-pill);
    }

    .l2 .lvl-dot {
      background: var(--l2-pill);
    }

    .l3 .lvl-dot {
      background: var(--l3-pill);
    }

    .l4 .lvl-dot {
      background: var(--l4-pill);
    }

    /* Section tag */
    .sec-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    /* URL cell */
    .url-cell {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.4;
    }

    .url-base {
      color: var(--muted);
    }

    .url-section {
      color: var(--muted2);
    }

    .url-leaf {
      color: var(--text);
      font-weight: 500;
    }

    .url-sep {
      color: var(--muted);
      opacity: 0.4;
    }

    /* Collection type */
    .coll-tag {
      font-size: 11px;
      color: var(--muted2);
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 14px;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted2);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        scottmarsh.com — CMS URL Map
      </div>
      <div class="header-stats" id="headerStats"></div>
    </div>
  </header>

  <div class="layout">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="Search any URL path or slug…" id="searchBox"
          oninput="applyFilters()">
      </div>

      <div class="filter-row">
        <span class="filter-label">Section</span>
        <button class="pill-btn active" onclick="setSection('all',this)">All sections</button>
        <button class="pill-btn" onclick="setSection('user-friendly-websites',this)">User-Friendly Websites</button>
        <button class="pill-btn" onclick="setSection('consumer-recommendations',this)">Consumer Recs</button>
        <button class="pill-btn" onclick="setSection('collective-intelligence',this)">Collective Intel</button>
        <button class="pill-btn" onclick="setSection('teen-business',this)">Teen Business</button>
        <button class="pill-btn" onclick="setSection('college-business',this)">College Business</button>
        <button class="pill-btn" onclick="setSection('immigrant',this)">Immigrant Resources</button>
        <button class="pill-btn" onclick="setSection('recession',this)">Recession Research</button>
        <button class="pill-btn" onclick="setSection('books',this)">Books</button>
      </div>

      <div class="filter-row">
        <span class="filter-label">Level</span>
        <div class="level-filters">
          <button class="lvl-btn l1 active" onclick="toggleLevel(1,this)">L1 — Section Hub</button>
          <button class="lvl-btn l2 active" onclick="toggleLevel(2,this)">L2 — Category</button>
          <button class="lvl-btn l3 active" onclick="toggleLevel(3,this)">L3 — Sub-category</button>
          <button class="lvl-btn l4 active" onclick="toggleLevel(4,this)">L4 — Article / Leaf</button>
        </div>
      </div>
    </div>

    <div class="result-meta">
      <div class="result-count" id="resultCount">Showing <strong>0</strong> URLs</div>
    </div>

    <div class="table-wrap">
      <table id="urlTable">
        <thead>
          <tr>
            <th onclick="sortBy('level')" id="th-level">Level <span class="sort-arrow">↕</span></th>
            <th onclick="sortBy('section')" id="th-section">Section <span class="sort-arrow">↕</span></th>
            <th>URL Path</th>
            <th onclick="sortBy('collection')" id="th-collection">Collection <span class="sort-arrow">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyState">
        <div class="empty-icon">◎</div>
        <div class="empty-text">No URLs match your filters</div>
      </div>
    </div>

    <div class="legend" id="legend"></div>
  </div>

    });

    // Build legend
    const legendEl = document.getElementById('legend');
    Object.entries(SECTION_META).forEach(([k, v]) => {
      legendEl.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${v.color}"></span>${v.label}</div>`;
    });

    // Build table
    function formatURL(url) {
      const clean = url.replace('/information-sources/', '');
      const parts = clean.replace(/\/$/, '').split('/');
      if (parts.length === 1) {
        return `<span class="url-base">/information-sources/</span><span class="url-leaf">${parts[0]}/</span>`;
      }
      const leaf = parts[parts.length - 1];
      const midParts = parts.slice(0, -1);
      // Build each mid segment with its trailing slash baked in as visible text
      const midHtml = midParts.map(p => `<span class="url-section">${p}/</span>`).join('');
      return `<span class="url-base">/information-sources/</span>${midHtml}<span class="url-leaf">${leaf}/</span>`;
    }

    const tbody = document.getElementById('tbody');
    URLS.forEach(([url, section, level], i) => {
      const sm = SECTION_META[section] || { label: section, color: '#666', bg: 'rgba(102,102,102,0.1)', border: 'rgba(102,102,102,0.3)' };
      const tr = document.createElement('tr');
      tr.dataset.section = section;
      tr.dataset.level = level;
      tr.dataset.url = url.toLowerCase();
      tr.style.animationDelay = `${Math.min(i * 8, 300)}ms`;
      tr.innerHTML = `
    <td><span class="lvl-pill l${level}"><span class="lvl-dot"></span>L${level}</span></td>
    <td><span class="sec-tag" style="background:${sm.bg};border-color:${sm.border};color:${sm.color}">${sm.label}</span></td>
    <td class="url-cell">${formatURL(url)}</td>
    <td class="coll-tag">${COLLECTION_LABEL[level] || ''}</td>
  `;
      tbody.appendChild(tr);
    });

    // Filters
    let activeSection = 'all';
    let activeLevels = new Set([1, 2, 3, 4]);

    function setSection(s, btn) {
      activeSection = s;
      document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function toggleLevel(l, btn) {
      if (activeLevels.has(l)) {
        if (activeLevels.size === 1) return;
        activeLevels.delete(l);
        btn.classList.remove('active');
      } else {
        activeLevels.add(l);
        btn.classList.add('active');
      }
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('searchBox').value.toLowerCase().trim();
      let visible = 0;
      document.querySelectorAll('#tbody tr').forEach(tr => {
        const matchSec = activeSection === 'all' || tr.dataset.section === activeSection;
        const matchLvl = activeLevels.has(parseInt(tr.dataset.level));
        const matchQ = !q || tr.dataset.url.includes(q);
        const show = matchSec && matchLvl && matchQ;
        tr.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      document.getElementById('resultCount').innerHTML = `Showing <strong>${visible}</strong> of ${URLS.length} URLs`;
      document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
    }

    applyFilters();

    // Sort
    let sortCol = null, sortDir = 1;
    function sortBy(col) {
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
      document.getElementById('th-' + col)?.classList.add('sorted');

      const rows = [...tbody.querySelectorAll('tr')];
      rows.sort((a, b) => {
        let av = col === 'level' ? parseInt(a.dataset.level) : a.dataset[col] || '';
        let bv = col === 'level' ? parseInt(b.dataset.level) : b.dataset[col] || '';
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }
